name: Security Scan (Trivy FS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'

# Principle of Least Privilege
permissions:
  contents: read

jobs:
  scan-fs:
    name: Trivy FS Scan (Containerized)
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (Node 24)

      # Directly invoke a secure v0.69.3 container without using Trivy Actions.
      - name: Run Trivy vulnerability scanner via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:0.69.3 fs \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            /workspace